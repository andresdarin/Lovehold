name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-render:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy-vercel:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Compute version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "version=0.$COUNT.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Inject version into source
        run: |
          echo "export const APP_VERSION = '${{ steps.version.outputs.version }}'" > apps/web/src/lib/version.ts

      - name: Deploy to Vercel
        run: |
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
